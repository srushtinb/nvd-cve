<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CVE LIST</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>CVE LIST</h1>
      <div class="total">Total Records: <strong id="total">0</strong></div>

      <div class="controls">
        <input
          type="text"
          id="search"
          placeholder="Search by CVE ID or Source"
        />
        <button onclick="loadCVEs(1)">Search</button>
        <button onclick="syncNow()">Sync Now</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>CVE ID</th>
            <th>Source</th>
            <th>Published Date</th>
            <th>Last Modified Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div class="footer">
        Results per page:
        <select id="perPage" onchange="loadCVEs(1)">
          <option value="10">10</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <div id="pagination"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
