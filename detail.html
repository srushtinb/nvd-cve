<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CVE Detail</title>
  <style>
    body{font-family:Arial;background:#f8f9fa;margin:0;padding:20px;}
    .container{max-width:1000px;margin:auto;background:white;padding:30px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.1);}
    .back{color:#007bff;font-weight:bold;margin-bottom:20px;display:inline-block;}
    h1{background:#007bff;color:white;padding:20px;border-radius:10px;text-align:center;margin:0 0 25px;font-size:2em;}
    .info{background:#e7f3ff;padding:20px;border-radius:8px;margin-bottom:25px;}
    .section{margin-top:30px;}
    .section h2{color:#007bff;border-bottom:2px solid #007bff;padding-bottom:8px;}
    .score{font-size:3em;font-weight:bold;padding:15px 30px;border-radius:10px;color:white;display:inline-block;margin:10px 0;}
    .critical{background:#d32f2f}.high{background:#f57c00}.medium{background:#ffb300;color:#000}.low{background:#388e3c}
    ul{padding-left:0;} li{background:#f8f9fa;padding:12px;margin:8px 0;border-radius:6px;list-style:none;}
    a{color:#007bff;text-decoration:none;}
  </style>
</head>
<body>
<div class="container">
  <a href="/" class="back">← Back to Dashboard</a>
  <h1 id="cveId">CVE-XXXX-XXXX</h1>
  <div class="info" id="info"></div>

  <div class="section"><h2>Description</h2><p id="desc">Loading real CVE data...</p></div>
  <div class="section"><h2>CVSS Score</h2><div id="score" class="score low">N/A</div></div>
  <div class="section" id="refSec" style="display:none"><h2>References</h2><ul id="refs"></ul></div>
</div>

<script>
  const cveId = location.pathname.split('/').pop();
  document.getElementById('cveId').textContent = cveId;

  // THIS LINE IS THE ONLY ONE THAT MATTERS
  fetch(`/cves/${cveId}`)          // ← This matches your route
    .then(r => r.json())
    .then(d => {
      document.getElementById('info').innerHTML = `
        <strong>Source:</strong> ${d.sourceIdentifier || 'cve@mitre.org'}<br>
        <strong>Published:</strong> ${d.publishedDate}<br>
        <strong>Last Modified:</strong> ${d.lastModifiedDate}<br>
        <strong>Status:</strong> <span style="padding:4px 10px;background:#333;color:white;border-radius:4px">${d.vulnStatus}</span>
      `;
      document.getElementById('desc').textContent = d.description || 'No description available';

      const score = d.cvssV3Score || d.cvssV2Score || 0;
      const s = document.getElementById('score');
      s.textContent = score.toFixed(1);
      if(score >= 9) s.className = 'score critical';
      else if(score >= 7) s.className = 'score high';
      else if(score >= 4) s.className = 'score medium';

      if(d.references && d.references.length > 0){
        document.getElementById('refSec').style.display = 'block';
        const ul = document.getElementById('refs');
        d.references.forEach(r => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${r}" target="_blank">${r}</a>`;
          ul.appendChild(li);
        });
      }
    })
    .catch(err => {
      document.getElementById('desc').textContent = 'Error loading CVE details';
      console.error(err);
    });
</script>
</body>
</html>
